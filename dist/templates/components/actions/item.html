<a href="{{URL}}" 
   class="action-button btn btn-lg px-4 py-3 w-540"
   style="
     background: #222;
     color: #fff;
     border-radius: 8px;
     font-weight: 700;
     text-transform: uppercase;
     letter-spacing: 1px;
     transition: all .2s ease;
   "
   onmouseover="this.style.background='#000'"
   onmouseout="this.style.background='#222'">
  {{TITLE}}
</a>
