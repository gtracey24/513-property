<header class="hero-{{HERO_VARIANT}} py-5 text-center"
  style="
    position: relative;
    background-image: url('assets/images/apartments.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  "
>

  <!-- Gradient Overlay -->
  <div style="
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0.55),
      rgba(0, 0, 0, 0.25)
    );
  "></div>

  <div class="container" style="position: relative; z-index: 2;">
    <div class="row justify-content-center" style="align-items: center;">

      <div class="col-lg-8">
        <h1>{{HERO_HEADLINE}}</h1>
        <p class="lead">{{HERO_SUBHEADLINE}}</p>

        <div class="hero-cta-buttons d-flex gap-3 flex-wrap justify-content-center">
          {{HERO_CTA_BUTTONS}}
        </div>
      </div>

    </div>
  </div>
</header>
