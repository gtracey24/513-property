<section id="contact" class="py-6" style="background: #f5f5f5;">
  <div class="container text-center py-5">

    <!-- Headline -->
    <h2 class="mb-3" style="font-size: 2.4rem; font-weight: 700;">
      {{CTA_HEADLINE}}
    </h2>

    <!-- Description -->
    <p class="lead mb-4" style="max-width: 700px; margin: 0 auto;">
      {{CTA_DESCRIPTION}}
    </p>

    <!-- Image -->
    <img src="{{CTA_IMAGE}}" 
         alt="{{CTA_NAME}}" 

         style="width: 360px; height:auto; object-fit: cover;">

    <!-- CTA Button -->
    <!-- <a href="{{CTA_BUTTON_URL}}" 
       class="btn btn-primary btn-lg px-4 py-2 mb-3"
       style="font-weight: 600; border-radius: 50px;">
      {{CTA_BUTTON_LABEL}}
    </a> -->

    <!-- Contact Info -->
    <div class="mt-3" style="font-size: 1.2rem; font-weight: 600;">
      📞 {{CTA_PHONE}}
    </div>

    <a href="mailto:{{CTA_EMAIL}}" 
       style="font-size: 1.1rem; font-weight: 500; color: #333;">
      {{CTA_EMAIL}}
    </a>

  </div>
</section>
